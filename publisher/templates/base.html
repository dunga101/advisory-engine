<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>{% block title %}Advisory Engine{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="site-header">
  <div class="page">
    <a class="brand" href="/">Advisory Engine</a>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/digest/">Patch Tuesday Digest</a>
    </nav>
  </div>
</header>
<div class="page">
<main>
{% block content %}{% endblock %}
</main>
<footer class="site-footer">
  <p>Structured vendor advisory data only — no AI-generated narrative in this view.
  Generated {{ generated_at.strftime('%Y-%m-%d %H:%M UTC') }}.</p>
</footer>
</div>
</body>
</html>
